name: Deploy

on:
  push:
    branches: [ "live" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    - uses: actions/checkout@v4

    - name: Create .env file
      shell: powershell
      run: |
        $envFile = ".env"
    
        "HR_EMAIL=${{ secrets.HR_EMAIL }}" | Out-File -FilePath $envFile -Encoding utf8
        "EMAIL_USER=${{ secrets.EMAIL_USER }}" | Out-File -FilePath $envFile -Encoding utf8 -Append
        "Encryption=${{ vars.Encryption }}" | Out-File -FilePath $envFile -Encoding utf8 -Append
        "SMTP_HOST=${{ vars.SMTP_HOST }}" | Out-File -FilePath $envFile -Encoding utf8 -Append
        "SMTP_PORT=${{ vars.SMTP_PORT }}" | Out-File -FilePath $envFile -Encoding utf8 -Append

    - name: Build & Run
      run: |
        docker compose down
        docker compose up -d --build
