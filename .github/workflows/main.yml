name: Deploy

on:
  push:
    branches: [ "live" ]

jobs:
  deploy:
    runs-on: self-hosted

    steps:
    - uses: actions/checkout@v4

    - name: Create .env file
      run: |
        echo HR_EMAIL=${{ secrets.HR_EMAIL }} >> .env
        echo EMAIL_USER=${{ secrets.EMAIL_PASS }} >> .env
        echo Encryption=${{ vars.Encryption }} >> .env
        echo SMTP_HOST=${{ vars.SMTP_HOST }} >> .env
        echo SMTP_PORT=${{ vars.SMTP_PORT }} >> .env

    - name: Build & Run
      run: |
        docker compose down
        docker compose up -d --build
